<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>密码生成器 · 配置面板</title>
  </head>
  <body>
    <form id="passwordForm">
      <div>
        <label for="baseStr">原始字符串（必须包含）:</label>
        <input
          type="text"
          id="baseStr"
          value="hello"
          placeholder="例如 hello"
        />
      </div>

      <div>
        <label for="pwdLength">密码长度:</label>
        <input type="number" id="pwdLength" value="12" min="1" step="1" />
      </div>

      <div>
        <label for="shuffle">允许乱序:</label>
        <input type="checkbox" id="shuffle" />
      </div>

      <div>
        <label for="allowSeparator">允许分隔 (字符间可插入):</label>
        <input type="checkbox" id="allowSeparator" />
      </div>

      <div>
        <button type="button" id="generateBtn">✨ 生成新密码（回车）</button>
      </div>
    </form>

    <hr />

    <!-- 结果显示区域，纯文本输出，无样式 -->
    <div>
      <strong>生成的密码:</strong>
      <span id="resultDisplay">(点击生成)</span>
    </div>

    <div>
      <strong>当前参数:</strong>
      <pre id="paramsDisplay" style="display: inline; margin: 0">
(等待生成)</pre
      >
    </div>
    <button type="button" id="copyBtn">📋 复制密码</button>
    <script>
      /**
       * 生成密码函数
       * @param {string} str - 必须包含的原始字符串
       * @param {number} length - 输出的密码长度
       * @param {boolean} shuffle - 是否允许对原始字符串乱序
       * @param {boolean} allowSeparator - 是否允许在原始字符串字符间插入额外字符
       * @returns {string} 生成的密码字符串
       * @throws {Error} 如果密码长度小于原始字符串长度，抛出错误
       */
      function generatePassword(
        str,
        length,
        shuffle = false,
        allowSeparator = false
      ) {
        // 类型与边界检查
        if (typeof str !== "string") {
          throw new Error("第一个参数必须是字符串");
        }
        if (typeof length !== "number" || length < str.length) {
          throw new Error(`密码长度必须至少为原始字符串长度 (${str.length})`);
        }

        // 1. 处理乱序：如果允许乱序，则将字符串打散成数组并随机排序
        let baseChars = str.split("");
        if (shuffle) {
          // Fisher-Yates 洗牌算法打乱顺序
          for (let i = baseChars.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [baseChars[i], baseChars[j]] = [baseChars[j], baseChars[i]];
          }
        }

        // 2. 确定额外需要填充的字符数
        const fillCount = length - str.length;

        // 3. 生成随机填充字符池（可打印ASCII字符范围 33-126，避开容易混淆的字符如空格、引号等，可根据需要调整）
        const generateRandomChar = () => {
          // 使用更通用的可打印字符范围: 数字、大小写字母、常见符号
          const printableChars =
            "!@#$%^&*()_+=-[]{}|;:,.<>?0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
          return printableChars[
            Math.floor(Math.random() * printableChars.length)
          ];
        };

        // 4. 根据是否允许分隔来构建最终密码
        if (!allowSeparator) {
          // 不允许分隔：原始字符串必须连续出现
          // 随机决定原始字符串的起始位置 (0 到 fillCount)
          const startPos = Math.floor(Math.random() * (fillCount + 1));
          const result = [];

          // 先填充 startPos 个随机字符
          for (let i = 0; i < startPos; i++) {
            result.push(generateRandomChar());
          }
          // 放入原始字符串（可能是乱序后的）
          result.push(...baseChars);
          // 填充剩余字符
          for (let i = result.length; i < length; i++) {
            result.push(generateRandomChar());
          }
          return result.join("");
        } else {
          // 允许分隔：将原始字符串的字符分散插入，之间可以插入任意数量随机字符
          // 思路：在 n 个字符之间有 n+1 个空隙（包括首尾），向这些空隙中随机分配填充字符
          const n = baseChars.length;
          // 生成一个长度为 n+1 的数组，每个元素代表该位置前要插入的随机字符数
          const gaps = new Array(n + 1).fill(0);
          let remaining = fillCount;

          // 随机分配剩余填充字符到各个空隙
          for (let i = 0; i < remaining; i++) {
            // 随机选择一个空隙
            const gapIndex = Math.floor(Math.random() * (n + 1));
            gaps[gapIndex]++;
          }

          // 按顺序构建：先放 gaps[0] 个随机字符，然后放 baseChars[0]，再放 gaps[1] 个随机字符，然后 baseChars[1]... 最后放 gaps[n] 个随机字符
          const result = [];
          for (let i = 0; i < n; i++) {
            // 插入当前空隙的随机字符
            for (let j = 0; j < gaps[i]; j++) {
              result.push(generateRandomChar());
            }
            // 插入原始字符
            result.push(baseChars[i]);
          }
          // 处理最后一个空隙
          for (let j = 0; j < gaps[n]; j++) {
            result.push(generateRandomChar());
          }
          return result.join("");
        }
      }

      // 示例与测试
      console.log("--- 测试用例 ---");

      // 基础示例
      console.log(
        "1. 不允许乱序，不允许分隔：",
        generatePassword("abc", 8, false, false)
      );
      // 可能输出: "12abc345" (abc连续出现)

      console.log(
        "2. 允许乱序，不允许分隔：",
        generatePassword("abc", 8, true, false)
      );
      // 可能输出: "56bca789" (乱序后连续出现)

      console.log(
        "3. 不允许乱序，允许分隔：",
        generatePassword("abc", 8, false, true)
      );
      // 可能输出: "1a2b3c45" (字符间插入了随机字符)

      console.log(
        "4. 允许乱序，允许分隔：",
        generatePassword("abc", 8, true, true)
      );
      // 可能输出: "b@1c9a34" (字符乱序且分散)

      // 边界情况：长度等于原始字符串长度
      console.log(
        "5. 长度等于原串，不允许分隔：",
        generatePassword("xyz", 3, false, false)
      ); // 必须输出 "xyz" 或乱序
      console.log(
        "6. 长度等于原串，允许分隔：",
        generatePassword("xyz", 3, false, true)
      ); // 因为没有填充字符，所以还是 "xyz"

      // 错误示例
      try {
        generatePassword("test", 2);
      } catch (e) {
        console.log("7. 错误捕获:", e.message);
      }
    </script>
    <script>
      (function () {
        // 获取DOM元素
        const baseStrInput = document.getElementById("baseStr");
        const pwdLengthInput = document.getElementById("pwdLength");
        const shuffleCheck = document.getElementById("shuffle");
        const allowSeparatorCheck = document.getElementById("allowSeparator");
        const generateBtn = document.getElementById("generateBtn");
        const resultSpan = document.getElementById("resultDisplay");
        const paramsPre = document.getElementById("paramsDisplay");

        // 辅助函数：获取当前表单值
        function getFormValues() {
          return {
            str: baseStrInput.value,
            length: parseInt(pwdLengthInput.value, 10),
            shuffle: shuffleCheck.checked,
            allowSeparator: allowSeparatorCheck.checked,
          };
        }

        // 辅助函数：验证长度有效性
        function isValidLength(length, minLength) {
          return !isNaN(length) && length >= minLength;
        }

        // 核心函数：生成密码并返回结果（纯函数式）
        function tryGeneratePassword() {
          const { str, length, shuffle, allowSeparator } = getFormValues();

          // 验证输入
          if (!isValidLength(length, 1)) {
            return { success: false, message: "❌ 长度必须为正整数" };
          }

          try {
            const password = generatePassword(
              str,
              length,
              shuffle,
              allowSeparator
            );
            return { success: true, value: password };
          } catch (error) {
            return { success: false, message: `❌ 错误: ${error.message}` };
          }
        }

        // 更新UI显示
        function updateDisplay() {
          const { str, length, shuffle, allowSeparator } = getFormValues();

          // 更新参数显示
          const base = str || "(空字符串)";
          paramsPre.textContent = `str="${base}", length=${length}, shuffle=${shuffle}, allowSeparator=${allowSeparator}`;

          // 生成并显示密码
          const result = tryGeneratePassword();
          resultSpan.textContent = result.success
            ? result.value
            : result.message;
        }

        // 初始化表单默认值
        function initFormDefaults() {
          if (!baseStrInput.value) baseStrInput.value = "hello";
          if (!pwdLengthInput.value) pwdLengthInput.value = "12";
        }

        // 事件监听 - 使用统一的更新函数
        generateBtn.addEventListener("click", updateDisplay);

        // 回车键支持
        baseStrInput.addEventListener("keypress", (e) => {
          if (e.key === "Enter") updateDisplay();
        });

        pwdLengthInput.addEventListener("keypress", (e) => {
          if (e.key === "Enter") updateDisplay();
        });

        // 页面加载
        window.addEventListener("load", () => {
          initFormDefaults();
          updateDisplay();
        });

        // 可选：实时更新（取消注释即可启用）
        // shuffleCheck.addEventListener('change', updateDisplay);
        // allowSeparatorCheck.addEventListener('change', updateDisplay);
      })();
      // 最简版本 - 直接复制
      document.getElementById("copyBtn").addEventListener("click", () => {
        const password = document.getElementById("resultDisplay").textContent;
        if (password && !password.startsWith("❌")) {
          navigator.clipboard
            ?.writeText(password)
            .then(() => showSuccess("复制成功！"))
            .catch(() => showError("复制失败，请手动复制"));
        }
      });
    </script>
    <script>
// 创建提示容器（使用Symbol确保唯一性）
const toastContainer = (() => {
  const containerSymbol = Symbol("toast-container");

  return function getToastContainer() {
    // 尝试从全局缓存获取
    if (!window[containerSymbol]) {
      const container = document.createElement("div");
      container.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
      `;
      document.body.appendChild(container);
      window[containerSymbol] = container;
    }
    return window[containerSymbol];
  };
})();

// 成功提示动画
function showSuccess(message) {
  const container = toastContainer();
  const toast = document.createElement("div");

  toast.style.cssText = `
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    display: flex;
    align-items: center;
    gap: 8px;
    transform: translateX(120%);
    transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    max-width: 300px;
    word-break: break-word;
    pointer-events: auto;
    cursor: pointer;
  `;

  toast.innerHTML = `
    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" style="flex-shrink: 0;">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
    </svg>
    <span>${message}</span>
  `;

  container.appendChild(toast);

  // 点击立即关闭
  toast.addEventListener("click", () => {
    toast.style.transform = "translateX(120%)";
    setTimeout(() => toast.remove(), 300);
  });

  // 进入动画
  requestAnimationFrame(() => {
    toast.style.transform = "translateX(0)";
  });

  // 自动关闭
  setTimeout(() => {
    if (toast.isConnected) {
      toast.style.transform = "translateX(120%)";
      setTimeout(() => toast.remove(), 300);
    }
  }, 3000);
}

// 失败提示动画
function showError(message) {
  const container = toastContainer();
  const toast = document.createElement("div");

  toast.style.cssText = `
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    display: flex;
    align-items: center;
    gap: 8px;
    transform: scale(0.8);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 300px;
    word-break: break-word;
    pointer-events: auto;
    cursor: pointer;
  `;

  toast.innerHTML = `
    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" style="flex-shrink: 0;">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
    </svg>
    <span>${message}</span>
  `;

  container.appendChild(toast);

  // 点击立即关闭
  toast.addEventListener("click", () => {
    toast.style.transform = "scale(0.8)";
    toast.style.opacity = "0";
    setTimeout(() => toast.remove(), 300);
  });

  // 进入动画
  requestAnimationFrame(() => {
    toast.style.transform = "scale(1)";
    toast.style.opacity = "1";
  });

  // 自动关闭
  setTimeout(() => {
    if (toast.isConnected) {
      toast.style.transform = "scale(0.8)";
      toast.style.opacity = "0";
      setTimeout(() => toast.remove(), 300);
    }
  }, 3000);
}

</script>
  </body>
</html>
